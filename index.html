<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" href="/favicon-32.png" sizes="32x32" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <!--
      Default: mobile-friendly. Warehouse TVs often report ~960 CSS px @ dpr=2
      on a Full HD panel; the inline bootstrap below upgrades viewport to 1920
      so the kanban lays out at design density before first paint.
    -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      ;(function () {
        try {
          var dpr = window.devicePixelRatio || 1
          var cssW = window.innerWidth || document.documentElement.clientWidth || 0
          var cssH = window.innerHeight || document.documentElement.clientHeight || 0
          if (!(cssW > 0) || dpr < 1.5) return
          var physicalW = cssW * dpr
          var compressed = cssW < 1920 * 0.7
          var nearFullHd = physicalW >= 1920 * 0.9 && physicalW <= 1920 * 1.15
          var landscape = !cssH || cssW >= cssH * 0.85
          if (!(compressed && nearFullHd && landscape)) return
          var meta = document.querySelector('meta[name="viewport"]')
          if (meta) meta.setAttribute('content', 'width=1920')
          document.documentElement.dataset.tvViewport = 'design'
        } catch (e) {}
      })()
    </script>
    <meta name="theme-color" content="#1F2447" />
    <title>BOON DASH</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
